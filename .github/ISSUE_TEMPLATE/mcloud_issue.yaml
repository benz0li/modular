name: Modular Cloud bug or feature request
description: Report a bug or suggest a feature for Modular Cloud
title: "[MCloud] "
labels:
  - "mcloud,Needs Triage"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to help us improve Modular Cloud!

        Please provide a descriptive title above and fill in the following fields.

  - type: dropdown
    id: RequestType
    attributes:
      label: Is this a bug or a feature request?
      options:
        - Bug
        - Feature request
    validations:
      required: true

  - type: textarea
    id: Description
    attributes:
      label: Please describe the bug or feature request.
      description: If it's a bug, please include any necessary reproduction details such as browser.
    validations:
      required: true

  - type: textarea
    id: Motivation
    attributes:
      label: Please describe any motivation that would help prioritize this further.
      description: "Ex: How large is your inference need, or how impactful would this be for your organization."
    validations:
      required: false
